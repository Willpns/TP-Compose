services:
  db_mongo:
    build: 
      context: ./mongo
    container_name: db_mongo
    restart: on-failure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"const count = db.getSiblingDB('blog_db').posts.countDocuments({}); if(count !== 5) { throw new Error('Healthcheck Failed: La collection ne contient pas 5 articles'); }\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  db_mysql:
    image: mysql:8.0
    container_name: db_mysql
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "mysql --user=$$MYSQL_USER --password=$$MYSQL_PASSWORD --execute \"SELECT COUNT(*) FROM hybrid_db.utilisateurs HAVING COUNT(*) > 0;\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin_mongo:
    image: mongo-express
    container_name: admin_mongo
    restart: on-failure
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: db_mongo
    ports:
      - "8081:8081"
    networks:
      - backend_net
      - frontend_net
    healthcheck:
      test: ["CMD-SHELL", "ps | grep node || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 2
    depends_on:
      db_mongo:
        condition: service_healthy

  admin_mysql:
    image: adminer
    container_name: admin_mysql
    restart: on-failure
    ports:
      - "8080:8080"
    networks:
      - backend_net
      - frontend_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db_mysql:
        condition: service_healthy

  api:
    build:
      context: ./api
    container_name: api
    restart: on-failure
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - backend_net
      - frontend_net
    depends_on:
      db_mongo:
        condition: service_healthy
      db_mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/posts && curl -f http://localhost:8000/users || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  backend_net:
    internal: true
  frontend_net:

volumes:
  mysql_data:
  mongo_data: